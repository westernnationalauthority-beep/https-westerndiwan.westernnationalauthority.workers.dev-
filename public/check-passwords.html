<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>فحص كلمات المرور - S-BUTTO</title>
  <style>
    * { box-sizing: border-box; font-family: Tahoma, Arial, sans-serif; }
    body {
      background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
      margin: 0; padding: 20px; color: #1f2937;
    }
    .container {
      max-width: 1200px; margin: 0 auto;
      background: white; border-radius: 16px;
      padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { color: #1e3a8a; margin-top: 0; }
    h2 { color: #312e81; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
    .alert {
      padding: 15px; border-radius: 8px; margin: 15px 0;
      font-weight: bold;
    }
    .alert-danger { background: #fee2e2; color: #991b1b; border: 2px solid #fca5a5; }
    .alert-success { background: #d1fae5; color: #065f46; border: 2px solid #6ee7b7; }
    .alert-warning { background: #fef3c7; color: #92400e; border: 2px solid #fcd34d; }
    table {
      width: 100%; border-collapse: collapse; margin: 20px 0;
      font-size: 13px;
    }
    th, td {
      border: 1px solid #d1d5db; padding: 10px;
      text-align: right;
    }
    th {
      background: #1e3a8a; color: white;
      position: sticky; top: 0;
    }
    tr:nth-child(even) { background: #f9fafb; }
    tr:hover { background: #eef2ff; }
    .badge {
      display: inline-block; padding: 4px 10px;
      border-radius: 9999px; font-size: 11px; font-weight: bold;
    }
    .badge-danger { background: #fecaca; color: #991b1b; }
    .badge-success { background: #a7f3d0; color: #065f46; }
    .hash {
      font-family: monospace; font-size: 10px;
      color: #6b7280; word-break: break-all;
      max-width: 400px;
    }
    .btn {
      padding: 12px 24px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: bold; cursor: pointer;
      margin: 5px;
    }
    .btn-primary { background: #1e3a8a; color: white; }
    .btn-primary:hover { background: #1e40af; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-success { background: #059669; color: white; }
    .btn-success:hover { background: #047857; }
    pre {
      background: #1f2937; color: #10b981;
      padding: 15px; border-radius: 8px;
      overflow-x: auto; font-size: 11px;
    }
    .test-box {
      background: #f3f4f6; padding: 20px;
      border-radius: 12px; margin: 20px 0;
      border: 2px solid #d1d5db;
    }
    input, select {
      padding: 10px; border: 2px solid #d1d5db;
      border-radius: 8px; font-size: 14px;
      margin: 5px; min-width: 200px;
    }
    input:focus, select:focus {
      outline: none; border-color: #1e3a8a;
    }
    .summary-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px; margin: 20px 0;
    }
    .summary-card {
      padding: 20px; border-radius: 12px;
      text-align: center; color: white;
    }
    .summary-card h3 { margin: 0 0 10px 0; font-size: 14px; opacity: 0.9; }
    .summary-card .number { font-size: 36px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 أداة فحص تشفير كلمات المرور</h1>
    <p>المنظومة: <strong>S-BUTTO</strong> - الهيئة الوطنية لمكافحة الفساد</p>
    
    <div id="summary"></div>
    <div id="alert-area"></div>
    
    <h2>📋 قائمة المستخدمين</h2>
    <div id="users-table"></div>
    
    <h2>🧪 اختبار التحقق من كلمة المرور</h2>
    <div class="test-box">
      <div>
        <label><strong>اسم المستخدم:</strong></label><br>
        <select id="test-username"></select>
      </div>
      <div>
        <label><strong>كلمة المرور (النص الصريح):</strong></label><br>
        <input type="text" id="test-password" placeholder="أدخل كلمة المرور للاختبار">
      </div>
      <div>
        <button class="btn btn-primary" onclick="testLogin()">🔐 اختبار التحقق</button>
        <button class="btn btn-success" onclick="upgradeAll()">⬆️ ترقية جميع كلمات المرور</button>
        <button class="btn btn-danger" onclick="clearAll()">🗑️ مسح جميع المستخدمين</button>
      </div>
      <div id="test-result" style="margin-top:15px"></div>
    </div>
    
    <h2>📄 البيانات الخام (localStorage)</h2>
    <pre id="raw-data"></pre>
  </div>

  <script>
    const STORAGE_KEY = "nacc_users_v2";

    function getUsers() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch { return []; }
    }

    function isPasswordHashed(value) {
      if (!value) return false;
      try {
        const parsed = JSON.parse(value);
        return parsed && parsed.version === "pbkdf2" && parsed.hash && parsed.salt;
      } catch { return false; }
    }

    function truncate(str, max = 60) {
      if (!str) return "-";
      return str.length > max ? str.substring(0, max) + "..." : str;
    }

    function render() {
      const users = getUsers();
      
      // ملخص
      const hashed = users.filter(u => isPasswordHashed(u.password)).length;
      const plain = users.length - hashed;
      
      document.getElementById("summary").innerHTML = `
        <div class="summary-grid">
          <div class="summary-card" style="background:linear-gradient(135deg,#1e3a8a,#312e81)">
            <h3>إجمالي المستخدمين</h3>
            <div class="number">${users.length}</div>
          </div>
          <div class="summary-card" style="background:linear-gradient(135deg,#059669,#10b981)">
            <h3>كلمات مرور مشفرة ✅</h3>
            <div class="number">${hashed}</div>
          </div>
          <div class="summary-card" style="background:linear-gradient(135deg,#dc2626,#ef4444)">
            <h3>كلمات مرور غير مشفرة ⚠️</h3>
            <div class="number">${plain}</div>
          </div>
        </div>
      `;

      // تنبيه
      const alertArea = document.getElementById("alert-area");
      if (plain > 0) {
        alertArea.innerHTML = `
          <div class="alert alert-danger">
            ⚠️ تحذير: يوجد ${plain} مستخدم بكلمة مرور غير مشفرة! 
            اضغط "ترقية جميع كلمات المرور" فوراً.
          </div>
        `;
      } else if (users.length > 0) {
        alertArea.innerHTML = `
          <div class="alert alert-success">
            ✅ جميع كلمات المرور مشفرة بتقنية PBKDF2.
          </div>
        `;
      }

      // جدول المستخدمين
      let html = `<table>
        <thead>
          <tr>
            <th>الاسم</th>
            <th>اسم المستخدم</th>
            <th>الدور</th>
            <th>حالة كلمة المرور</th>
            <th>قيمة كلمة المرور المخزنة</th>
          </tr>
        </thead>
        <tbody>`;
      
      users.forEach(u => {
        const isHashed = isPasswordHashed(u.password);
        let passwordDisplay = "";
        
        if (isHashed) {
          try {
            const hash = JSON.parse(u.password);
            passwordDisplay = `
              <div class="hash">
                <strong>الإصدار:</strong> ${hash.version}<br>
                <strong>التكرارات:</strong> ${hash.iterations}<br>
                <strong>Hash:</strong> ${truncate(hash.hash, 80)}<br>
                <strong>Salt:</strong> ${truncate(hash.salt, 40)}
              </div>
            `;
          } catch {
            passwordDisplay = `<span class="hash">${truncate(u.password)}</span>`;
          }
        } else {
          passwordDisplay = `<span class="badge badge-danger">⚠️ ${u.password}</span>`;
        }
        
        html += `
          <tr>
            <td><strong>${u.fullName}</strong></td>
            <td dir="ltr">${u.username}</td>
            <td>${u.role === "admin" ? "👑 مدير" : "👤 موظف"}</td>
            <td>${isHashed 
              ? '<span class="badge badge-success">✅ PBKDF2</span>' 
              : '<span class="badge badge-danger">⚠️ نص صريح</span>'
            }</td>
            <td>${passwordDisplay}</td>
          </tr>
        `;
      });
      
      html += `</tbody></table>`;
      document.getElementById("users-table").innerHTML = html;

      // قائمة الاختبار
      const select = document.getElementById("test-username");
      select.innerHTML = users.map(u => 
        `<option value="${u.id}">${u.fullName} (${u.username})</option>`
      ).join("");

      // البيانات الخام
      document.getElementById("raw-data").textContent = JSON.stringify(users, null, 2);
    }

    async function hashPassword(password, providedSalt) {
      const SALT_LENGTH = 16;
      const PBKDF2_ITERATIONS = 100000;
      const KEY_LENGTH = 256;
      
      let saltBytes;
      if (providedSalt) {
        const binary = atob(providedSalt);
        saltBytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          saltBytes[i] = binary.charCodeAt(i);
        }
      } else {
        saltBytes = crypto.getRandomValues(new Uint8Array(SALT_LENGTH));
      }
      
      const encoder = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        "raw", encoder.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]
      );
      
      const hashBuffer = await crypto.subtle.deriveBits(
        {
          name: "PBKDF2",
          salt: new Uint8Array(saltBytes),
          iterations: PBKDF2_ITERATIONS,
          hash: "SHA-256",
        },
        keyMaterial, KEY_LENGTH
      );
      
      let binary = "";
      new Uint8Array(hashBuffer).forEach(b => binary += String.fromCharCode(b));
      const hash = btoa(binary);
      
      binary = "";
      saltBytes.forEach(b => binary += String.fromCharCode(b));
      const salt = btoa(binary);
      
      return { version: "pbkdf2", salt, hash, iterations: PBKDF2_ITERATIONS };
    }

    async function verifyPassword(password, stored) {
      const computed = await hashPassword(password, stored.salt);
      return computed.hash === stored.hash;
    }

    async function testLogin() {
      const userId = document.getElementById("test-username").value;
      const password = document.getElementById("test-password").value;
      const resultDiv = document.getElementById("test-result");
      
      if (!userId || !password) {
        resultDiv.innerHTML = `<div class="alert alert-danger">اختر مستخدماً وأدخل كلمة المرور</div>`;
        return;
      }
      
      const users = getUsers();
      const user = users.find(u => u.id === userId);
      
      if (!user) {
        resultDiv.innerHTML = `<div class="alert alert-danger">المستخدم غير موجود</div>`;
        return;
      }
      
      resultDiv.innerHTML = `<div class="alert alert-warning">⏳ جاري التحقق...</div>`;
      
      try {
        if (isPasswordHashed(user.password)) {
          const hash = JSON.parse(user.password);
          const valid = await verifyPassword(password, hash);
          
          resultDiv.innerHTML = valid
            ? `<div class="alert alert-success">✅ كلمة المرور صحيحة! (PBKDF2 verified)</div>`
            : `<div class="alert alert-danger">❌ كلمة المرور غير صحيحة</div>`;
        } else {
          const valid = user.password === password;
          resultDiv.innerHTML = valid
            ? `<div class="alert alert-success">✅ كلمة المرور صحيحة (نص صريح - يجب الترقية)</div>`
            : `<div class="alert alert-danger">❌ كلمة المرور غير صحيحة</div>`;
        }
      } catch (e) {
        resultDiv.innerHTML = `<div class="alert alert-danger">خطأ: ${e.message}</div>`;
      }
    }

    async function upgradeAll() {
      if (!confirm("هل تريد ترقية جميع كلمات المرور غير المشفرة إلى PBKDF2؟")) return;
      
      const users = getUsers();
      let upgraded = 0;
      
      for (const u of users) {
        if (!isPasswordHashed(u.password)) {
          try {
            const hash = await hashPassword(u.password);
            u.password = JSON.stringify(hash);
            u.passwordVersion = "pbkdf2";
            upgraded++;
          } catch (e) {
            console.error(`فشل ترقية ${u.username}:`, e);
          }
        }
      }
      
      localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
      
      if (upgraded > 0) {
        alert(`✅ تم ترقية ${upgraded} مستخدم إلى PBKDF2`);
      } else {
        alert(`ℹ️ جميع كلمات المرور مشفرة بالفعل`);
      }
      
      render();
    }

    function clearAll() {
      if (!confirm("⚠️ تحذير: سيتم حذف جميع المستخدمين! هل أنت متأكد؟")) return;
      if (!confirm("⚠️⚠️ تأكيد أخير: سيتم حذف كل شيء!")) return;
      
      localStorage.removeItem(STORAGE_KEY);
      alert("🗑️ تم مسح جميع المستخدمين");
      render();
    }

    // التشغيل
    render();
  </script>
</body>
</html>
